name: CI

on:
  push:
    branches: [master, Develop]
  pull_request:
    branches: [master, Develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: vibeia

      - name: Run ESLint (Backend)
        run: npm run lint
        working-directory: backend
        continue-on-error: true

      - name: Run ESLint (Frontend)
        run: npm run lint
        working-directory: vibeia

      - name: Check formatting (Backend)
        run: npx prettier --check "src/**/*.ts" || true
        working-directory: backend

      - name: Check formatting (Frontend)
        run: npx prettier --check "src/**/*.{ts,tsx}" || true
        working-directory: vibeia

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: vibeia

      - name: TypeScript Check (Backend)
        run: npx tsc --noEmit
        working-directory: backend
        continue-on-error: true

      - name: TypeScript Check (Frontend)
        run: npx tsc --noEmit
        working-directory: vibeia

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run tests
        run: npm run test -- --passWithNoTests --coverage
        working-directory: backend
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install
        working-directory: vibeia

      - name: Run tests
        run: npm run test -- --passWithNoTests --coverage
        working-directory: vibeia
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: vibeia/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: vibeia

      - name: Build Backend
        run: npm run build
        working-directory: backend

      - name: Build Frontend
        run: npm run build
        working-directory: vibeia
        env:
          NEXT_PUBLIC_API_URL: https://vibeia.onrender.com

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Audit backend
        run: npm audit --audit-level=high || true
        working-directory: backend

      - name: Audit frontend
        run: npm audit --audit-level=high || true
        working-directory: vibeia

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true