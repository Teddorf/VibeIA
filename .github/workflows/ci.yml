name: CI

on:
  push:
    branches: [master, Develop]
  pull_request:
    branches: [master, Develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: vibeia

      - name: Run ESLint (Backend)
        run: npm run lint
        working-directory: backend

      - name: Run ESLint (Frontend)
        run: npm run lint
        working-directory: vibeia

      - name: Check formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}" --ignore-path .gitignore

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: vibeia

      - name: TypeScript Check (Backend)
        run: npx tsc --noEmit
        working-directory: backend

      - name: TypeScript Check (Frontend)
        run: npx tsc --noEmit
        working-directory: vibeia

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests
        run: npm run test -- --passWithNoTests --coverage
        working-directory: backend
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: vibeia

      - name: Run tests
        run: npm run test -- --passWithNoTests --coverage
        working-directory: vibeia
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: vibeia/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: vibeia

      - name: Build Backend
        run: npm run build
        working-directory: backend

      - name: Build Frontend
        run: npm run build
        working-directory: vibeia
        env:
          NEXT_PUBLIC_API_URL: https://vibeia.onrender.com

  knip:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: vibeia

      - name: Run Knip
        run: npm run knip
        continue-on-error: true

  biome:
    name: Biome Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run Biome
        run: npm run biome:check
        continue-on-error: true

  changeset-check:
    name: Changeset Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Check for changeset
        run: |
          if [ -z "$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null)" ]; then
            echo "⚠️  No changeset found. Consider adding one with 'npm run changeset'"
            echo "This is optional for small fixes, but recommended for features and breaking changes."
          else
            echo "✅ Changeset found"
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Audit backend
        run: npm audit --audit-level=high || true
        working-directory: backend

      - name: Audit frontend
        run: npm audit --audit-level=high || true
        working-directory: vibeia

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
